<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DecisionTrack</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0;
      font-size: 32px;
    }

    .header p {
      margin-top: 8px;
      color: #6b7280;
      font-size: 15px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .list-header h2 {
      margin: 0;
      font-size: 22px;
    }

    .empty {
      color: #6b7280;
      text-align: center;
      padding: 30px 10px;
      border: 1px dashed #cbd5e1;
      border-radius: 12px;
      background: #f8fafc;
    }

    .decision-item {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      background: #ffffff;
    }

    .decision-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .decision-title {
      font-size: 18px;
      font-weight: bold;
      margin: 0;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .draft {
      background: #fef3c7;
      color: #92400e;
    }

    .review {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .decided {
      background: #dcfce7;
      color: #166534;
    }

    .cancelled {
      background: #fee2e2;
      color: #991b1b;
    }

    .meta-text {
      color: #6b7280;
      font-size: 13px;
    }

    .section-title {
      font-size: 13px;
      font-weight: bold;
      color: #374151;
      margin: 14px 0 6px;
    }

    .content-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
    }

    .item-actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
    }

    .small-btn {
      padding: 9px 12px;
      font-size: 13px;
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>DecisionTrack</h1>
      <p>팀 의사결정을 기록하고 관리하는 간단한 회사용 Decision Log</p>
    </div>

    <div class="card">
      <div class="form-grid">
        <div class="full">
          <label for="topic">Topic</label>
          <input id="topic" type="text" placeholder="예: 일본 시장 진출 검토" />
        </div>

        <div>
          <label for="team">Team</label>
          <input id="team" type="text" placeholder="예: Strategy Team" />
        </div>

        <div>
          <label for="status">Status</label>
          <select id="status">
            <option>Draft</option>
            <option>Review</option>
            <option>Decided</option>
            <option>Cancelled</option>
          </select>
        </div>

        <div class="full">
          <label for="description">Description</label>
          <textarea id="description" placeholder="상황 설명, 왜 이 결정을 논의하는지"></textarea>
        </div>

        <div>
          <label for="pros">Pros</label>
          <textarea id="pros" placeholder="장점 입력"></textarea>
        </div>

        <div>
          <label for="cons">Cons</label>
          <textarea id="cons" placeholder="단점 입력"></textarea>
        </div>

        <div class="full">
          <label for="summary">Summary</label>
          <textarea id="summary" placeholder="결정 요약 또는 핵심 정리"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="primary" onclick="saveDecision()">Save Decision</button>
        <button class="secondary" onclick="clearForm()">Clear</button>
      </div>
    </div>

    <div class="card">
      <div class="list-header">
        <h2>Decision Log</h2>
      </div>
      <div id="decisionList"></div>
    </div>
  </div>

  <script>
    let decisions = JSON.parse(localStorage.getItem("decisions")) || [];

    function saveDecision() {
      const topic = document.getElementById("topic").value.trim();
      const team = document.getElementById("team").value.trim();
      const status = document.getElementById("status").value;
      const description = document.getElementById("description").value.trim();
      const pros = document.getElementById("pros").value.trim();
      const cons = document.getElementById("cons").value.trim();
      const summary = document.getElementById("summary").value.trim();

      if (!topic) {
        alert("Topic을 입력하세요.");
        return;
      }

      const decision = {
        id: Date.now(),
        topic,
        team,
        status,
        description,
        pros,
        cons,
        summary,
        date: new Date().toLocaleDateString("ko-KR")
      };

      decisions.unshift(decision);
      localStorage.setItem("decisions", JSON.stringify(decisions));

      renderDecisions();
      clearForm();
    }

    function clearForm() {
      document.getElementById("topic").value = "";
      document.getElementById("team").value = "";
      document.getElementById("status").value = "Draft";
      document.getElementById("description").value = "";
      document.getElementById("pros").value = "";
      document.getElementById("cons").value = "";
      document.getElementById("summary").value = "";
    }

    function deleteDecision(id) {
      decisions = decisions.filter(item => item.id !== id);
      localStorage.setItem("decisions", JSON.stringify(decisions));
      renderDecisions();
    }

    function getStatusClass(status) {
      const key = status.toLowerCase();
      if (key === "draft") return "draft";
      if (key === "review") return "review";
      if (key === "decided") return "decided";
      return "cancelled";
    }

    function renderDecisions() {
      const list = document.getElementById("decisionList");

      if (decisions.length === 0) {
        list.innerHTML = '<div class="empty">아직 저장된 의사결정이 없습니다.</div>';
        return;
      }

      list.innerHTML = decisions.map(item => `
        <div class="decision-item">
          <div class="decision-top">
            <div>
              <p class="decision-title">${escapeHtml(item.topic)}</p>
              <div class="meta-text">Date: ${escapeHtml(item.date)}${item.team ? " · Team: " + escapeHtml(item.team) : ""}</div>
            </div>
            <div class="meta">
              <span class="badge ${getStatusClass(item.status)}">${escapeHtml(item.status)}</span>
            </div>
          </div>

          ${item.description ? `
            <div>
              <div class="section-title">Description</div>
              <div class="content-box">${escapeHtml(item.description)}</div>
            </div>
          ` : ""}

          ${item.pros ? `
            <div>
              <div class="section-title">Pros</div>
              <div class="content-box">${escapeHtml(item.pros)}</div>
            </div>
          ` : ""}

          ${item.cons ? `
            <div>
              <div class="section-title">Cons</div>
              <div class="content-box">${escapeHtml(item.cons)}</div>
            </div>
          ` : ""}

          ${item.summary ? `
            <div>
              <div class="section-title">Summary</div>
              <div class="content-box">${escapeHtml(item.summary)}</div>
            </div>
          ` : ""}

          <div class="item-actions">
            <button class="delete-btn small-btn" onclick="deleteDecision(${item.id})">Delete</button>
          </div>
        </div>
      `).join("");
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    renderDecisions();
  </script>
</body>
</html>
