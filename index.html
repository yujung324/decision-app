<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DecisionTrack</title>

<style>

body{
font-family:Arial;
background:#f3f5f7;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:8px;
margin:6px 0;
}

button{
padding:8px 12px;
margin-top:6px;
cursor:pointer;
border:none;
background:#2d7ff9;
color:white;
border-radius:5px;
}

button.delete{
background:#e74c3c;
}

.vote button{
background:#555;
margin-right:5px;
}

.search{
margin-bottom:20px;
}

.summary{
background:#f7f9ff;
padding:10px;
border-radius:6px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>DecisionTrack</h1>

<div class="card">

<h3>New Agenda</h3>

<input id="agenda" placeholder="Agenda">

<input id="team" placeholder="Team">

<textarea id="description" placeholder="Description"></textarea>

<textarea id="pros" placeholder="Pros"></textarea>

<textarea id="cons" placeholder="Cons"></textarea>

<button onclick="saveDecision()">Save Decision</button>

</div>

<div class="search">

<input id="search" placeholder="Search agenda..." onkeyup="render()">

</div>

<h2>Decision Log</h2>

<div id="log"></div>

</div>

<script>

let decisions = JSON.parse(localStorage.getItem("decisions")) || [];

function saveDecision(){

let agenda=document.getElementById("agenda").value;
let team=document.getElementById("team").value;
let description=document.getElementById("description").value;
let pros=document.getElementById("pros").value;
let cons=document.getElementById("cons").value;

let summary = generateSummary(pros,cons);

let item = {
agenda,
team,
description,
pros,
cons,
summary,
up:0,
down:0,
date:new Date().toLocaleDateString()
};

decisions.push(item);

localStorage.setItem("decisions",JSON.stringify(decisions));

clearForm();

render();

}

function generateSummary(pros,cons){

let p=pros.split("\n").length;
let c=cons.split("\n").length;

if(p>c){
return "Recommendation: Proceed (Pros stronger)";
}

if(c>p){
return "Recommendation: Reconsider (Cons stronger)";
}

return "Recommendation: Needs further discussion";

}

function clearForm(){

document.getElementById("agenda").value="";
document.getElementById("team").value="";
document.getElementById("description").value="";
document.getElementById("pros").value="";
document.getElementById("cons").value="";

}

function vote(i,type){

if(type==="up")decisions[i].up++;
if(type==="down")decisions[i].down++;

localStorage.setItem("decisions",JSON.stringify(decisions));

render();

}

function removeDecision(i){

decisions.splice(i,1);

localStorage.setItem("decisions",JSON.stringify(decisions));

render();

}

function render(){

let log=document.getElementById("log");

let search=document.getElementById("search").value.toLowerCase();

log.innerHTML="";

decisions.forEach((d,i)=>{

if(!d.agenda.toLowerCase().includes(search)) return;

log.innerHTML+=`

<div class="card">

<h3>${d.agenda}</h3>

<b>Team:</b> ${d.team}<br>
<b>Date:</b> ${d.date}<br><br>

<b>Description</b><br>
${d.description}<br><br>

<b>Pros</b><br>
${d.pros}<br><br>

<b>Cons</b><br>
${d.cons}<br>

<div class="summary">

<b>AI Decision Summary</b><br>
${d.summary}

</div>

<div class="vote">

<button onclick="vote(${i},'up')">👍 ${d.up}</button>

<button onclick="vote(${i},'down')">👎 ${d.down}</button>

<button class="delete" onclick="removeDecision(${i})">Delete</button>

</div>

</div>

`;

});

}

render();

</script>

</body>
</html>
