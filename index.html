<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecisionTrack</title>
<link rel="icon" href="DT_20260310_120547_0000.png">

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:0 auto;
}

.card{
background:#fff;
border-radius:20px;
padding:24px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

h2{
margin:0 0 20px;
font-size:28px;
font-weight:500;
}

label{
display:block;
margin:18px 0 8px;
font-size:18px;
font-weight:700;
}

input, textarea, select{
width:100%;
box-sizing:border-box;
border:2px solid #ddd;
border-radius:14px;
padding:14px;
font-size:16px;
background:#fff;
}

textarea{
min-height:90px;
resize:vertical;
}

.vote-buttons{
display:flex;
gap:12px;
margin-top:18px;
}

.vote-buttons button{
flex:1;
border:none;
border-radius:14px;
padding:14px 10px;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.yes{background:#dff5e5;}
.no{background:#f8dddd;}
.hold{background:#e9e3fa;}

.vote-count{
display:flex;
gap:12px;
margin-top:14px;
}

.vote-count span{
flex:1;
text-align:center;
background:#eef0f5;
border-radius:999px;
padding:12px 10px;
font-size:18px;
font-weight:700;
}

.buttons{
display:flex;
gap:12px;
margin-top:20px;
}

.save{
flex:1;
background:#3f6df6;
color:#fff;
border:none;
border-radius:14px;
padding:16px;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.clear{
flex:1;
background:#e5e7eb;
color:#111;
border:none;
border-radius:14px;
padding:16px;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.log-wrap{
margin-top:24px;
}

.log-card{
background:#fff;
border-radius:18px;
padding:18px;
margin-top:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.meta{
color:#555;
margin-bottom:8px;
}

.small-row{
margin-top:10px;
font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>New Agenda</h2>

<label>Meeting Date</label>
<input type="date" id="meetingDate">

<label>Decision Owner</label>
<input type="text" id="decisionOwner" placeholder="Owner">

<label>Status</label>
<select id="status">
<option>Open</option>
<option>Done</option>
</select>

<label>Priority</label>
<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<label>Agenda</label>
<input id="agenda" type="text">

<label>Team</label>
<input id="team" type="text">

<label>Description</label>
<textarea id="description"></textarea>

<label>Pros</label>
<textarea id="pros"></textarea>

<label>Cons</label>
<textarea id="cons"></textarea>

<label>Voter</label>
<input id="voter" type="text">

<div class="vote-buttons">
<button class="yes" onclick="vote('yes')">👍 Yes</button>
<button class="no" onclick="vote('no')">👎 No</button>
<button class="hold" onclick="vote('hold')">⏳ Hold</button>
</div>

<div class="vote-count">
<span id="yesCount">Yes 0</span>
<span id="noCount">No 0</span>
<span id="holdCount">Hold 0</span>
</div>

<label>Final Decision</label>
<textarea id="finalDecision"></textarea>

<label>Meeting Record</label>
<textarea id="meetingRecord"></textarea>

<div class="buttons">
<button class="save" onclick="saveRecord()">Save Record</button>
<button class="clear" onclick="clearForm()">Clear</button>
</div>

</div>

<div class="log-wrap">
<h2>Meeting Decision Log</h2>
<div id="recordList"></div>
</div>

</div>

<script>

let yes=0
let no=0
let hold=0

let records=JSON.parse(localStorage.getItem("decisiontrack_records"))||[]

function vote(type){

if(type==="yes") yes++
if(type==="no") no++
if(type==="hold") hold++

document.getElementById("yesCount").innerText="Yes "+yes
document.getElementById("noCount").innerText="No "+no
document.getElementById("holdCount").innerText="Hold "+hold

}

function clearForm(){

document.getElementById("agenda").value=""
document.getElementById("team").value=""
document.getElementById("description").value=""
document.getElementById("pros").value=""
document.getElementById("cons").value=""
document.getElementById("voter").value=""
document.getElementById("finalDecision").value=""
document.getElementById("meetingRecord").value=""
document.getElementById("meetingDate").value=""
document.getElementById("decisionOwner").value=""

yes=0
no=0
hold=0

document.getElementById("yesCount").innerText="Yes 0"
document.getElementById("noCount").innerText="No 0"
document.getElementById("holdCount").innerText="Hold 0"

}

function saveRecord(){

const record={

meetingDate:document.getElementById("meetingDate").value,
owner:document.getElementById("decisionOwner").value,
status:document.getElementById("status").value,
priority:document.getElementById("priority").value,

agenda:document.getElementById("agenda").value,
team:document.getElementById("team").value,
description:document.getElementById("description").value,
pros:document.getElementById("pros").value,
cons:document.getElementById("cons").value,
voter:document.getElementById("voter").value,

finalDecision:document.getElementById("finalDecision").value,
meetingRecord:document.getElementById("meetingRecord").value,

yes,
no,
hold,

date:new Date().toLocaleString()

}

records.unshift(record)

localStorage.setItem(
"decisiontrack_records",
JSON.stringify(records)
)

renderRecords()

clearForm()

}

function renderRecords(){

const list=document.getElementById("recordList")

list.innerHTML=records.map(r=>`

<div class="log-card">

<h3>${r.agenda||"(No Agenda)"}</h3>

<div class="meta">

Team: ${r.team||"-"} |
Owner: ${r.owner||"-"} |
Priority: ${r.priority||"-"} |
Status: ${r.status||"-"}

</div>

<div class="small-row">
Meeting Date: ${r.meetingDate||"-"}
</div>

<div>
<b>Decision:</b> ${r.finalDecision||"-"}
</div>

<div class="small-row">
<b>Votes:</b> Yes ${r.yes} / No ${r.no} / Hold ${r.hold}
</div>

</div>

`).join("")

}

renderRecords()

</script>

</body>
</html>
