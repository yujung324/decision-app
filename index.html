<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecisionTrack</title>

<style>
body{
font-family:Arial;
background:#f4f7fb;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:700;
}

.primary{background:#2563eb;color:white}
.secondary{background:#e5e7eb}
.danger{background:#ef4444;color:white}

input,textarea,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.vote-btn{
padding:10px;
margin-right:10px;
border-radius:8px;
}

.vote-for{background:#dcfce7}
.vote-against{background:#fee2e2}
.vote-hold{background:#ede9fe}

.vote-pill{
display:inline-block;
margin-right:10px;
padding:6px 10px;
border-radius:20px;
background:#f1f5f9;
}

.hidden{display:none}

.log-card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
border:1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<h1>DecisionTrack</h1>

<div id="authSection" class="card">

<h3>Login</h3>

<input id="authName" placeholder="이름">
<input id="authPassword" type="password" placeholder="비밀번호">

<button class="primary" onclick="signUp()">SignUp</button>
<button class="secondary" onclick="login()">Login</button>

</div>

<div id="appSection" class="hidden">

<div class="card">

<h3>New Agenda</h3>

<label>안건</label>
<input id="topic">

<label>팀</label>
<input id="team">

<label>설명</label>
<textarea id="description"></textarea>

<label>찬성 의견</label>
<textarea id="pros"></textarea>

<label>반대 의견</label>
<textarea id="cons"></textarea>

<label>투표자</label>
<input id="voterName">

<div>

<button class="vote-btn vote-for" onclick="addVote('찬성')">👍 찬성</button>
<button class="vote-btn vote-against" onclick="addVote('반대')">👎 반대</button>
<button class="vote-btn vote-hold" onclick="addVote('보류')">⏳ 보류</button>

</div>

<div>

<span class="vote-pill">찬성 <span id="voteForCount">0</span></span>
<span class="vote-pill">반대 <span id="voteAgainstCount">0</span></span>
<span class="vote-pill">보류 <span id="voteHoldCount">0</span></span>

</div>

<label>최종 결정</label>
<textarea id="decision"></textarea>

<label>회의 기록</label>
<textarea id="meetingNotes"></textarea>

<button class="primary" onclick="saveAgenda()">Save Record</button>
<button class="secondary" onclick="clearForm()">Clear</button>

</div>

<div class="card">

<h3>Meeting Decision Log</h3>

<div id="recordList"></div>

</div>

</div>

</div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||[]
let currentUser=JSON.parse(localStorage.getItem("currentUser"))||null
let records=JSON.parse(localStorage.getItem("records"))||[]
let votes=[]

function signUp(){

const name=document.getElementById("authName").value
const password=document.getElementById("authPassword").value

users.push({name,password})

localStorage.setItem("users",JSON.stringify(users))

alert("회원가입 완료")

}

function login(){

const name=document.getElementById("authName").value
const password=document.getElementById("authPassword").value

const user=users.find(u=>u.name===name&&u.password===password)

if(!user){
alert("로그인 실패")
return
}

currentUser=user
localStorage.setItem("currentUser",JSON.stringify(user))

document.getElementById("authSection").classList.add("hidden")
document.getElementById("appSection").classList.remove("hidden")

renderRecords()

}

function addVote(type){

const name=document.getElementById("voterName").value

if(!name)return

votes.push({name,type})

renderVotes()

}

function renderVotes(){

document.getElementById("voteForCount").innerText=votes.filter(v=>v.type==="찬성").length
document.getElementById("voteAgainstCount").innerText=votes.filter(v=>v.type==="반대").length
document.getElementById("voteHoldCount").innerText=votes.filter(v=>v.type==="보류").length

}

async function saveAgenda(){

const topic=document.getElementById("topic").value
const team=document.getElementById("team").value
const description=document.getElementById("description").value
const pros=document.getElementById("pros").value
const cons=document.getElementById("cons").value
const decision=document.getElementById("decision").value
const meetingNotes=document.getElementById("meetingNotes").value

const record={
topic,
team,
description,
pros,
cons,
decision,
meetingNotes,
votes,
date:new Date().toLocaleString()
}

records.unshift(record)

localStorage.setItem("records",JSON.stringify(records))

renderRecords()

clearForm()

if(window.db){

try{

await addDoc(collection(db,"decisionLogs"),record)

console.log("Firebase 저장 완료")

}catch(e){

console.log("Firebase 저장 실패")

}

}

}

function clearForm(){

document.getElementById("topic").value=""
document.getElementById("team").value=""
document.getElementById("description").value=""
document.getElementById("pros").value=""
document.getElementById("cons").value=""
document.getElementById("decision").value=""
document.getElementById("meetingNotes").value=""
document.getElementById("voterName").value=""

votes=[]

renderVotes()

}

function renderRecords(){

const list=document.getElementById("recordList")

list.innerHTML=records.map(r=>`

<div class="log-card">

<b>${r.topic}</b>

<div>팀: ${r.team}</div>
<div>결정: ${r.decision}</div>

</div>

`).join("")

}

</script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBR3QMI-MtUbIhKgXkBTOWCBW4ZQucjXd0",
authDomain:"decisionos-28eb1.firebaseapp.com",
projectId:"decisionos-28eb1",
storageBucket:"decisionos-28eb1.appspot.com",
messagingSenderId:"934462461871",
appId:"1:934462461871:web:3b49ee6597a87b7aa9815a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

window.db=db
window.addDoc=addDoc
window.collection=collection

console.log("Firebase 연결 완료")

</script>

</body>
</html>
