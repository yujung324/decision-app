<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecisionTrack</title>

<style>

body{
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

h1{
margin-bottom:20px;
}

label{
font-weight:600;
margin-top:12px;
display:block;
}

input,textarea{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
}

.vote-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.vote-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.yes{
background:#dff5e5;
}

.no{
background:#ffdede;
}

.hold{
background:#e8e4ff;
}

.count{
display:flex;
justify-content:space-between;
margin-top:10px;
font-weight:600;
}

.decision-box{
border:2px solid #d6a54a;
border-radius:12px;
padding:15px;
margin-top:10px;
}

.save{
background:#3b6eea;
color:white;
padding:12px;
border:none;
border-radius:10px;
margin-top:15px;
cursor:pointer;
}

.clear{
background:#ddd;
padding:12px;
border:none;
border-radius:10px;
margin-top:15px;
margin-left:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>DecisionTrack</h1>

<div class="card">

<h2>New Agenda</h2>

<label>안건</label>
<input id="agenda">

<label>팀</label>
<input id="team">

<label>설명</label>
<textarea id="desc"></textarea>

<label>찬성 의견</label>
<textarea id="pros"></textarea>

<label>반대 의견</label>
<textarea id="cons"></textarea>

<label>투표자</label>
<input id="voter">

<div class="vote-buttons">
<button class
