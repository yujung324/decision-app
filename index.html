
 <!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DecisionTrack</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 960px;
      margin: 32px auto;
      padding: 16px;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0;
      font-size: 32px;
    }

    .header p {
      margin: 8px 0 0;
      color: #6b7280;
      line-height: 1.5;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      margin-bottom: 22px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .sub-title {
      margin: 18px 0 8px;
      font-size: 15px;
      font-weight: bold;
      color: #374151;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
      color: #374151;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
      line-height: 1.5;
    }

    .vote-box {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .vote-item {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
    }

    .vote-item label {
      margin-bottom: 8px;
      text-align: center;
    }

    .vote-item input {
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .primary {
      background: #2563eb;
      color: #fff;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .danger {
      background: #ef4444;
      color: #fff;
    }

    .decision-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .search-box {
      width: 280px;
      max-width: 100%;
    }

    .empty {
      padding: 28px 14px;
      text-align: center;
      color: #6b7280;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 14px;
    }

    .log-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
      background: #fff;
    }

    .log-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .log-title {
      margin: 0;
      font-size: 20px;
      font-weight: bold;
    }

    .meta {
      margin-top: 6px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.5;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .draft {
      background: #fef3c7;
      color: #92400e;
    }

    .review {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .approved {
      background: #dcfce7;
      color: #166534;
    }

    .rejected {
      background: #fee2e2;
      color: #991b1b;
    }

    .deferred {
      background: #ede9fe;
      color: #5b21b6;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .info-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }

    .info-label {
      font-size: 12px;
      color: #6b7280;
      font-weight: bold;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .info-content {
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
    }

    .vote-summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .vote-pill {
      background: #f3f4f6;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: bold;
    }

    .log-actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .form-grid,
      .info-grid,
      .vote-box {
        grid-template-columns: 1fr;
      }

      .search-box {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>DecisionTrack</h1>
      <p>
        문제 안건을 등록하고, 찬반 의견과 투표, 최종 결정을 남기는
        회의용 의사결정 기록 앱
      </p>
    </div>

    <div class="card">
      <h2 class="section-title">New Agenda</h2>

      <div class="form-grid">
        <div class="full">
          <label for="topic">안건 / 문제</label>
          <input id="topic" type="text" placeholder="예: 일본 시장 진출 검토" />
        </div>

        <div>
          <label for="team">팀</label>
          <input id="team" type="text" placeholder="예: Strategy Team" />
        </div>

        <div>
          <label for="status">진행 상태</label>
          <select id="status">
            <option value="Draft">Draft</option>
            <option value="Review">Review</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
            <option value="Deferred">Deferred</option>
          </select>
        </div>

        <div class="full">
          <label for="description">안건 설명</label>
          <textarea id="description" placeholder="무슨 문제인지, 왜 논의하는지, 배경을 입력"></textarea>
        </div>

        <div>
          <label for="pros">찬성 의견 / 장점</label>
          <textarea id="pros" placeholder="예: 시장 확대 가능&#10;매출 성장 기대"></textarea>
        </div>

        <div>
          <label for="cons">반대 의견 / 단점</label>
          <textarea id="cons" placeholder="예: 초기 투자 비용 큼&#10;현지 경쟁 강함"></textarea>
        </div>

        <div class="full">
          <div class="sub-title">투표</div>
          <div class="vote-box">
            <div class="vote-item">
              <label for="voteFor">찬성 👍</label>
              <input id="voteFor" type="number" min="0" value="0" />
            </div>
            <div class="vote-item">
              <label for="voteAgainst">반대 👎</label>
              <input id="voteAgainst" type="number" min="0" value="0" />
            </div>
            <div class="vote-item">
              <label for="voteHold">보류 ⏳</label>
              <input id="voteHold" type="number" min="0" value="0" />
            </div>
          </div>
        </div>

        <div class="full">
          <label for="decision">최종 결정</label>
          <textarea id="decision" placeholder="예: 3개월 파일럿 테스트 후 본진출 여부 재결정"></textarea>
        </div>

        <div class="full">
          <label for="meetingNotes">회의 기록</label>
          <textarea id="meetingNotes" placeholder="회의 중 나온 핵심 논의, 결론 배경, 액션 아이템"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="primary" onclick="saveAgenda()">Save Record</button>
        <button class="secondary" onclick="clearForm()">Clear</button>
      </div>
    </div>

    <div class="card">
      <div class="decision-list-header">
        <h2 class="section-title" style="margin:0;">Meeting Decision Log</h2>
        <input
          id="searchInput"
          class="search-box"
          type="text"
          placeholder="안건, 팀, 결정 검색"
          oninput="renderRecords()"
        />
      </div>

      <div id="recordList"></div>
    </div>
  </div>

  <script>
    let records = JSON.parse(localStorage.getItem("decisionTrackRecords")) || [];

    function saveAgenda() {
      const topic = document.getElementById("topic").value.trim();
      const team = document.getElementById("team").value.trim();
      const status = document.getElementById("status").value;
      const description = document.getElementById("description").value.trim();
      const pros = document.getElementById("pros").value.trim();
      const cons = document.getElementById("cons").value.trim();
      const voteFor = Number(document.getElementById("voteFor").value || 0);
      const voteAgainst = Number(document.getElementById("voteAgainst").value || 0);
      const voteHold = Number(document.getElementById("voteHold").value || 0);
      const decision = document.getElementById("decision").value.trim();
      const meetingNotes = document.getElementById("meetingNotes").value.trim();

      if (!topic) {
        alert("안건/문제를 입력하세요.");
        return;
      }

      const record = {
        id: Date.now(),
        topic,
        team,
        status,
        description,
        pros,
        cons,
        voteFor,
        voteAgainst,
        voteHold,
        decision,
        meetingNotes,
        date: new Date().toLocaleDateString("ko-KR"),
        createdAt: new Date().toLocaleString("ko-KR")
      };

      records.unshift(record);
      localStorage.setItem("decisionTrackRecords", JSON.stringify(records));

      clearForm();
      renderRecords();
    }

    function clearForm() {
      document.getElementById("topic").value = "";
      document.getElementById("team").value = "";
      document.getElementById("status").value = "Draft";
      document.getElementById("description").value = "";
      document.getElementById("pros").value = "";
      document.getElementById("cons").value = "";
      document.getElementById("voteFor").value = 0;
      document.getElementById("voteAgainst").value = 0;
      document.getElementById("voteHold").value = 0;
      document.getElementById("decision").value = "";
      document.getElementById("meetingNotes").value = "";
    }

    function deleteRecord(id) {
      records = records.filter(record => record.id !== id);
      localStorage.setItem("decisionTrackRecords", JSON.stringify(records));
      renderRecords();
    }

    function getStatusClass(status) {
      const map = {
        Draft: "draft",
        Review: "review",
        Approved: "approved",
        Rejected: "rejected",
        Deferred: "deferred"
      };
      return map[status] || "draft";
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return "";
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderRecords() {
      const list = document.getElementById("recordList");
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

      const filtered = records.filter(record => {
        const target = [
          record.topic,
          record.team,
          record.description,
          record.pros,
          record.cons,
          record.decision,
          record.meetingNotes,
          record.status
        ].join(" ").toLowerCase();

        return target.includes(keyword);
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">저장된 회의 기록이 없습니다.</div>';
        return;
      }

      list.innerHTML = filtered.map(record => `
        <div class="log-card">
          <div class="log-top">
            <div>
              <p class="log-title">${escapeHtml(record.topic)}</p>
              <div class="meta">
                날짜: ${escapeHtml(record.date)}
                ${record.team ? ` · 팀: ${escapeHtml(record.team)}` : ""}
              </div>
            </div>
            <div class="badge-row">
              <span class="badge ${getStatusClass(record.status)}">${escapeHtml(record.status)}</span>
            </div>
          </div>

          ${record.description ? `
            <div class="info-box" style="margin-bottom:12px;">
              <div class="info-label">안건 설명</div>
              <div class="info-content">${escapeHtml(record.description)}</div>
            </div>
          ` : ""}

          <div class="info-grid">
            <div class="info-box">
              <div class="info-label">찬성 의견 / 장점</div>
              <div class="info-content">${escapeHtml(record.pros || "-")}</div>
            </div>

            <div class="info-box">
              <div class="info-label">반대 의견 / 단점</div>
              <div class="info-content">${escapeHtml(record.cons || "-")}</div>
            </div>
          </div>

          <div class="vote-summary">
            <div class="vote-pill">찬성 👍 ${record.voteFor}</div>
            <div class="vote-pill">반대 👎 ${record.voteAgainst}</div>
            <div class="vote-pill">보류 ⏳ ${record.voteHold}</div>
          </div>

          ${record.decision ? `
            <div class="info-box" style="margin-top:14px;">
              <div class="info-label">최종 결정</div>
              <div class="info-content">${escapeHtml(record.decision)}</div>
            </div>
          ` : ""}

          ${record.meetingNotes ? `
            <div class="info-box" style="margin-top:12px;">
              <div class="info-label">회의 기록</div>
              <div class="info-content">${escapeHtml(record.meetingNotes)}</div>
            </div>
          ` : ""}

          <div class="meta" style="margin-top:12px;">
            기록 시각: ${escapeHtml(record.createdAt)}
          </div>

          <div class="log-actions">
            <button class="danger" onclick="deleteRecord(${record.id})">Delete</button>
          </div>
        </div>
      `).join("");
    }

    renderRecords();
  </script>
</body>
</html>   .
